name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Rename APK with build number
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk \
             "out/keychecker-debug-${{ github.run_number }}.apk"

      - name: Upload debug APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: keychecker-debug-apk
          path: out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK to a rolling "latest-debug" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest-debug"
          # Recreate the rolling release each push so the link is always current.
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Latest debug build (build #${{ github.run_number }})" \
            --notes "Auto-published from commit ${{ github.sha }} on $(date -u +'%Y-%m-%d %H:%M UTC').

          Sideload \`keychecker-debug-${{ github.run_number }}.apk\` on Android 13+." \
            "out/keychecker-debug-${{ github.run_number }}.apk"
